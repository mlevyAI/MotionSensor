name: Deploy web PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# The default GITHUB_TOKEN cannot CREATE a Pages site (admin-only API), so the
# official deploy-pages/configure-pages path 404s. Publishing to the gh-pages
# branch only needs contents:write and always succeeds; selecting that branch as
# the Pages source is a one-time repo setting.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Export web build
        env:
          # Project pages serve under /<repo>/ — set the asset base path.
          EXPO_BASE_URL: /motionsensor
        run: npx expo export --platform web
      - name: Disable Jekyll (keep _expo/ assets)
        run: touch dist/.nojekyll
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
