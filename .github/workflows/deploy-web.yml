name: Deploy web PWA to GitHub Pages

on:
  push:
    branches: [main, claude/rn-security-camera-arch-363uiw]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Configure Pages (auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      - name: Export web build
        env:
          # GitHub project pages serve under /<repo>/ — set the asset base path.
          EXPO_BASE_URL: /motionsensor
        run: npx expo export --platform web
      - name: Disable Jekyll (keep _expo/ assets)
        run: touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
